; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
; Common settings for all environments
framework = arduino
monitor_speed = 115200
lib_deps = 
    adafruit/Adafruit TinyUSB Library @ ^3.3.2
    adafruit/SdFat - Adafruit Fork @ ^2.2.3
    bblanchon/ArduinoJson @ ^7.2.1
    spacehuhn/SimpleCLI @ ^1.1.4

build_flags = 
    -Wall
    -Wno-unused-variable
    -Wno-unused-function
    -Wno-deprecated-declarations
    -Wno-sign-compare

; ========================================
; MalDuino (SAMD21 - Adafruit QT Py)
; ========================================
[env:malduino_samd21]
platform = atmelsam @ ~8.2.0
board = malduino
board_build.usb_manufacturer = "Maltronics"
board_build.usb_product = "MalDuino"
upload_protocol = sam-ba
extra_scripts = post:post_build.py
src_filter = +<*> -<msc/format_spi.cpp> -<msc/msc_spi.cpp>
build_flags = 
    ${env.build_flags}
    -DUSE_TINYUSB
    -DLED_PIN=4
    -DLED_DISABLED
    -DLED_SIMPLE
    -DMULTI_SELECTOR
    -DSELECTOR_1=A7
    -DSELECTOR_2=A6
    -DSELECTOR_3=A3
    -DSD_CS=1
    -I${platformio.packages_dir}/framework-arduino-samd-adafruit/libraries/Adafruit_TinyUSB_Arduino/src
    -I${platformio.packages_dir}/framework-arduino-samd-adafruit/libraries/SPI
    -I${platformio.packages_dir}/framework-arduino-samd-adafruit/libraries/Adafruit_ZeroDMA
    -I${platformio.packages_dir}/framework-arduino-samd-adafruit/libraries/Adafruit_ZeroDMA/utility
    -DHID_SERIAL='"0100"'
    -DHID_MANUFACTURER='"Maltronics"'
    -DHID_PRODUCT='"MalDuino"'
lib_deps = 
    ${env.lib_deps}
    adafruit/Adafruit SPIFlash @ ^4.0.0
    adafruit/Adafruit NeoPixel @ ^1.10.6
    adafruit/Adafruit Zero DMA Library @ ^1.1.3

; ========================================
; USB Nova MKI (SAMD21 - Adafruit QT Py)
; ========================================
[env:usbnova_mki]
platform = atmelsam @ ~8.2.0
board = adafruit_qt_py_m0
upload_protocol = sam-ba
extra_scripts = post:post_build.py
src_filter = +<*> -<msc/format_sd.cpp> -<msc/msc_sd.cpp>
build_flags = 
    ${env.build_flags}
    -DADAFRUIT_QTPY_M0
    -DUSE_TINYUSB
    -DCRYSTALLESS
    -DLED_PIN=11
    -DSELECTOR=A0
    -I${platformio.packages_dir}/framework-arduino-samd-adafruit/libraries/Adafruit_TinyUSB_Arduino/src
    -I${platformio.packages_dir}/framework-arduino-samd-adafruit/libraries/SPI
    -I${platformio.packages_dir}/framework-arduino-samd-adafruit/libraries/Adafruit_ZeroDMA
    -I${platformio.packages_dir}/framework-arduino-samd-adafruit/libraries/Adafruit_ZeroDMA/utility
    -D HID_SERIAL='"1337"'
    -D HID_MANUFACTURER='"SpacehuhnTech"'
    -D HID_PRODUCT='"USB Nova"'
lib_deps = 
    ${env.lib_deps}
    adafruit/Adafruit SPIFlash @ ^4.0.0
    adafruit/Adafruit NeoPixel @ ^1.10.6
    adafruit/Adafruit Zero DMA Library @ ^1.1.3

; ========================================
; USB Nova MKII (RP2040 - Generic)
; ========================================
[env:usbnova_mkii]
platform = raspberrypi
board = usbnova_mkii
board_build.core = earlephilhower
board_build.f_cpu = 133000000L
board_build.filesystem_size = 15M
src_filter = +<*> -<msc/format_sd.cpp> -<msc/msc_sd.cpp>
build_flags = 
    ${env.build_flags}
    -DARDUINO_GENERIC_RP2040
    -DUSE_TINYUSB
    -DLED_PIN=12
    -DSELECTOR=13
    -DHID_SERIAL='"1337"'
    -DHID_MANUFACTURER='"SpacehuhnTech"'
    -DHID_PRODUCT='"USB Nova 2"'
lib_deps = 
    ${env.lib_deps}
    adafruit/Adafruit SPIFlash @ ^4.0.0

; ========================================
; Adafruit Trinkey RP2040
; ========================================
[env:trinkey_rp2040]
platform = raspberrypi
board = adafruit_trinkeyrp2040qt
board_build.core = earlephilhower
board_build.filesystem_size = 7M
src_filter = +<*> -<msc/format_sd.cpp> -<msc/msc_sd.cpp>
build_flags = 
    ${env.build_flags}
    -DARDUINO_ADAFRUIT_TRINKEYQT_RP2040
    -DUSE_TINYUSB
    -DLED_PIN=27
    -DSELECTOR=12
    -DHID_SERIAL='"1337"'
    -DHID_MANUFACTURER='"Adafruit"'
    -DHID_PRODUCT='"DIY Nova"'
lib_deps = 
    ${env.lib_deps}
    adafruit/Adafruit SPIFlash @ ^4.0.0

; ========================================
; Raspberry Pi Pico
; ========================================
[env:pico]
platform = raspberrypi
board = pico
board_build.core = earlephilhower
board_build.filesystem_size = 1M
src_filter = +<*> -<msc/format_sd.cpp> -<msc/msc_sd.cpp>
build_flags = 
    ${env.build_flags}
    -DARDUINO_RASPBERRY_PI_PICO
    -DUSE_TINYUSB
    -DLED_PIN=-1
    -DSELECTOR=16
    -DHID_SERIAL='"1337"'
    -DHID_MANUFACTURER='"Raspberry"'
    -DHID_PRODUCT='"DIY Nova"'
lib_deps = 
    ${env.lib_deps}
    adafruit/Adafruit SPIFlash @ ^4.0.0
